services:
  - type: web
    name: complaint-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        scope: run
        value: mysql+pymysql://username:password@hostname:port/dbname
      - key: PYTHON_VERSION
        value: 3.10
